<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow"> <title>エッジAIモノクロ2値化 OCRシステム</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { 
      font-family: sans-serif; 
      margin: 20px; 
      text-align: center; 
      background-color: #f0f2f5; 
      color: #333; 
    }
    #video { 
      width: 100%; 
      max-width: 400px; 
      border: 2px solid #ccc; 
      border-radius: 8px; 
      background-color: #000; 
      margin-bottom: 10px;
    }
    #btn-scan { 
      background-color: #28a745; /* 緑色に変更。2値化への意気込み */
      color: white; 
      border: none; 
      padding: 12px 24px; 
      font-size: 16px; 
      border-radius: 4px; 
      cursor: pointer; 
      width: 100%; 
      max-width: 400px; 
    }
    #btn-scan:disabled { 
      background-color: #aaa; 
    }
    #status { 
      margin-top: 15px; 
      font-weight: bold; 
      color: #555; 
      font-size: 14px; 
    }
    #result { 
      margin-top: 15px; 
      padding: 10px; 
      background: #fff; 
      border: 1px solid #ddd; 
      border-radius: 4px; 
      text-align: left; 
      white-space: pre-wrap; 
      font-size: 13px; 
      max-width: 400px; 
      margin-left: auto; 
      margin-right: auto; 
    }
    /* 【デバッグ用】2値化された画像を画面下部にこっそり表示するエリア */
    #debug-canvas {
      display: none; /* 確認したい場合は 'block' に変更してください */
      border: 1px solid red;
      margin-top: 10px;
      max-width: 200px;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>

  <h3>エッジAI OCR スキャナー (モノクロ2値化搭載)</h3>
  <video id="video" autoplay playsinline allow="camera"></video>
  <br>
  <button id="btn-scan">読み取り実行 (2値化処理)</button>
  
  <div id="status">カメラを起動中...</div>
  <div id="result">【読み取り結果がここに表示されます】</div>

  <canvas id="debug-canvas"></canvas>

  <script>
    const video = document.getElementById('video');
    const btnScan = document.getElementById('btn-scan');
    const statusDiv = document.getElementById('status');
    const resultDiv = document.getElementById('result');
    const debugCanvas = document.getElementById('debug-canvas');

    // 1. スマホの背面カメラを起動
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false })
      .then(stream => {
        video.srcObject = stream;
        statusDiv.innerText = "カメラ準備完了。対象に向けてボタンを押してください。";
      })
      .catch(err => {
        statusDiv.innerText = "カメラの起動に失敗しました: " + err;
        btnScan.disabled = true;
      });

    // 💡 2値化処理関数 (引数: Canvasのコンテキスト、幅、高さ)
    function binarizeImage(ctx, width, height) {
      // Canvas上の全ピクセルデータを取得
      const imageData = ctx.getImageData(0, 0, width, height);
      const data = imageData.data; // 全ピクセルのRGBAデータが1列の配列に入っている

      // 閾値 (Threshold): この値より明るければ白、暗ければ黒にする (0〜255)
      // 128が標準ですが、免許証の金色や青色を飛ばすには「100〜160」あたりで調整
      const threshold = 120; 

      for (let i = 0; i < data.length; i += 4) {
        // RGBの平均値をとってグレースケール（灰色の濃淡）にする
        const gray = (data[i] + data[i + 1] + data[i + 2]) / 3;

        // グレースケール値を閾値と比較して、白(255)または黒(0)にする
        const value = gray > threshold ? 255 : 0;

        // R, G, Bすべてに同じ値をセットする（アルファ値（data[i+3]）は触らない）
        data[i] = value;     // Red
        data[i + 1] = value; // Green
        data[i + 2] = value; // Blue
      }

      // 加工したピクセルデータをCanvasに戻す
      ctx.putImageData(imageData, 0, 0);
    }

    // 2. ボタンを押した時の処理（2値化処理 ＞ エッジAI OCR実行）
    btnScan.addEventListener('click', async () => {
      btnScan.disabled = true;
      statusDiv.innerText = "画像を2値化して解析中（エッジAI処理）...";
      resultDiv.innerText = "";

      try {
        // ビデオ映像から現在の1フレームをキャプチャするための仮想Canvas
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        // ———— 💡 ここが今回の追加ポイント！ OCRの前に2値化を実行 ————
        binarizeImage(ctx, canvas.width, canvas.height);
        // ——————————————————————————————————————————————————

        // 【デバッグ用】2値化された画像をデバッグ用Canvasにコピーして表示 (確認したい場合)
        const debugCtx = debugCanvas.getContext('2d');
        debugCanvas.width = canvas.width;
        debugCanvas.height = canvas.height;
        debugCtx.drawImage(canvas, 0, 0);

        // Tesseract.jsによる文字認識 (日本語 'jpn' と英語・数字 'eng' を指定)
        // データソースとして、2値化処理済みのcanvasを指定します。
        const result = await Tesseract.recognize(canvas, 'jpn+eng', {
          logger: m => { 
            if(m.status === 'recognizing text') {
              statusDiv.innerText = `解析中: ${Math.floor(m.progress * 100)}%`; 
            }
          }
        });

        const detectedText = result.data.text;
        resultDiv.innerText = detectedText;
        statusDiv.innerText = "解析完了。Googleフォーム経由で送信中...";

        // 設定いただいたGoogleフォームのURLとentryのID (ここはそのまま)
        const formUrl = "https://docs.google.com/forms/d/e/1FAIpQLSf-DTlcr2g8FPyjZo_09zFqzVYqSp5nw_VnO6vzXMNkcH9GBg/formResponse";
        const entryId = "entry.2075487833";

        // フォームデータを作成
        const formData = new FormData();
        formData.append(entryId, detectedText);

        // Googleフォームへ送信
        fetch(formUrl, {
          method: "POST",
          mode: "no-cors",
          body: formData
        })
        .then(() => {
          statusDiv.innerText = "送信完了！スプレッドシートをご確認ください。";
          btnScan.disabled = false;
        })
        .catch((err) => {
          statusDiv.innerText = "書き込み失敗: " + err;
          btnScan.disabled = false;
        });

      } catch (error) {
        statusDiv.innerText = "エラーが発生しました。";
        resultDiv.innerText = error;
        btnScan.disabled = false;
      }
    });
  </script>
</body>
</html>
