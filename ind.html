<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow"> <!-- 検索エンジン除外 -->
  <title>バーコードスキャナー</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { 
      font-family: sans-serif; 
      margin: 20px; 
      text-align: center; 
      background-color: #f0f2f5; 
      color: #333; 
    }
    /* スキャン画面の枠組み */
    #reader { 
      width: 100%; 
      max-width: 400px; 
      margin: 0 auto;
      border: 2px solid #ccc; 
      border-radius: 8px; 
      background-color: #000; 
      overflow: hidden;
    }
    /* ズームコントロールエリア */
    #zoom-control {
      margin-top: 15px;
      display: flex;
      justify-content: center;
      gap: 10px;
      width: 100%;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
    }
    .btn-zoom {
      background-color: #6c757d;
      color: white;
      border: none;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: bold;
      border-radius: 4px;
      cursor: pointer;
      flex: 1;
    }
    .btn-zoom.active {
      background-color: #007bff; /* アクティブなズーム状態を目立たせる */
    }
    #status { 
      margin-top: 15px; 
      font-weight: bold; 
      color: #007bff; 
      font-size: 16px; 
    }
    #result-box {
      margin-top: 15px;
      padding: 15px;
      background: #fff;
      border: 2px dashed #28a745;
      border-radius: 4px;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
    }
    #result { 
      font-size: 24px; 
      font-weight: bold;
      color: #28a745;
      word-break: break-all;
    }
    .hint {
      font-size: 12px;
      color: #777;
      margin-top: 5px;
    }
  </style>
  <!-- 超高速バーコード・QRコード読み取りライブラリのインポート -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
</head>
<body>

  <h3>建機管理バーコードスキャナー</h3>
  
  <!-- カメラ映像と読み取り枠が表示されるエリア -->
  <div id="reader"></div>

  <!-- 💡 ズームボタンエリア（等倍と2倍ズーム） -->
  <div id="zoom-control">
    <button id="btn-zoom-1x" class="btn-zoom active">通常 (1x)</button>
    <button id="btn-zoom-2x" class="btn-zoom">2倍ズーム (2x)</button>
  </div>
  
  <div id="status">起動中...</div>
  
  <div id="result-box">
    <div style="font-size: 12px; color: #555;">最新の読み取り結果</div>
    <div id="result">【ここに結果が出ます】</div>
    <div class="hint">読み取りに成功すると自動でGoogleフォームへ送信されます</div>
  </div>

  <script>
    const statusDiv = document.getElementById('status');
    const resultDiv = document.getElementById('result');
    const btnZoom1x = document.getElementById('btn-zoom-1x');
    const btnZoom2x = document.getElementById('btn-zoom-2x');
    
    let html5QrcodeScanner = null;
    let cameraCapabilities = null; // カメラのズーム機能を保持する変数
    let isScanning = true; // 連続送信を防ぐフラグ

    // 💡 ブラウザのスピーカーで「ピッ」という電子音を作る関数
    function playBeep() {
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();

        oscillator.type = 'sine'; 
        oscillator.frequency.setValueAtTime(1500, audioCtx.currentTime); 
        gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime); 

        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 0.08); 
      } catch (e) {
        console.log("オーディオ再生エラー:", e);
      }
    }

    // 💡 読み取りに成功した時の処理
    function onScanSuccess(decodedText, decodedResult) {
      if (!isScanning) return; 
      isScanning = false;

      playBeep();

      resultDiv.innerText = decodedText;
      statusDiv.innerText = "読み取り成功！送信中...";

      // 設定いただいたGoogleフォームのURLとentryのID
      const formUrl = "https://docs.google.com/forms/d/e/1FAIpQLSf-DTlcr2g8FPyjZo_09zFqzVYqSp5nw_VnO6vzXMNkcH9GBg/formResponse";
      const entryId = "entry.2075487833";

      const formData = new FormData();
      formData.append(entryId, decodedText);

      fetch(formUrl, {
        method: "POST",
        mode: "no-cors",
        body: formData
      })
      .then(() => {
        statusDiv.innerText = "スプレッドシートへの記録が完了しました。";
        setTimeout(() => {
          statusDiv.innerText = "次のバーコードをかざしてください。";
          isScanning = true;
        }, 2000);
      })
      .catch((err) => {
        statusDiv.innerText = "書き込み失敗: " + err;
        isScanning = true;
      });
    }

    // 💡 ズーム倍率を変更する共通処理
    async function applyZoom(zoomValue) {
      if (!html5QrcodeScanner || !cameraCapabilities) return;
      
      // カメラがズームに対応しているかチェック
      if (cameraCapabilities.zoom) {
        try {
          // ズーム値をカメラに適用
          await html5QrcodeScanner.applyVideoConstrains({
            advanced: [{ zoom: zoomValue }]
          });
        } catch (err) {
          console.error("ズーム適用エラー:", err);
        }
      } else {
        statusDiv.innerText = "お使いの端末カメラはズーム制御に対応していません。";
      }
    }

    // 💡 ズームボタンのクリックイベント登録
    btnZoom1x.addEventListener('click', () => {
      btnZoom1x.classList.add('active');
      btnZoom2x.classList.remove('active');
      applyZoom(1); // 等倍（初期値）に戻す
    });

    btnZoom2x.addEventListener('click', () => {
      if (cameraCapabilities && cameraCapabilities.zoom) {
        btnZoom2x.classList.add('active');
        btnZoom1x.classList.remove('active');
        
        // カメラがサポートする最大ズーム値と「2」の小さい方を適用（安全策）
        const maxZoom = cameraCapabilities.zoom.max || 2;
        const targetZoom = Math.min(2, maxZoom);
        applyZoom(targetZoom);
      } else {
        alert("このスマートフォンのカメラはブラウザからのズーム制御に対応していません。");
      }
    });

    // 💡 ページを開いた瞬間に自動でカメラを起動してスキャン開始
    window.addEventListener('DOMContentLoaded', () => {
      html5QrcodeScanner = new Html5Qrcode("reader");
      
      const config = { 
        fps: 15, 
        qrbox: { width: 280, height: 150 }, 
        aspectRatio: 1.0,
        // 💡 【画素数の引き上げ】フルHD(1920x1080)を優先して要求
        videoConstraints: {
          width: { ideal: 1920 },
          height: { ideal: 1080 },
          facingMode: "environment"
        }
      };

      // 背面カメラでスキャンを開始
      html5QrcodeScanner.start(
        { facingMode: "environment" }, 
        config, 
        onScanSuccess
      )
      .then(() => {
        statusDiv.innerText = "スキャナー作動中。バーコードを枠に合わせてください。";
        
        // 💡 カメラ起動後にズーム機能（Capabilities）が使えるか取得して保持する
        setTimeout(() => {
          try {
            cameraCapabilities = html5QrcodeScanner.getRunningTrackCapabilities();
            if (!cameraCapabilities || !cameraCapabilities.zoom) {
              // ズーム非対応端末の場合はボタンを非表示、またはグレーアウト
              console.log("この端末はブラウザからのズーム制御に対応していません。");
            }
          } catch (e) {
            console.error("カメラ性能取得失敗:", e);
          }
        }, 1000); // カメラ起動完了を少し待ってから取得
      })
      .catch(err => {
        statusDiv.innerText = "カメラ起動エラー。アクセスを許可してください: " + err;
      });
    });
  </script>
</body>
</html>
