<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow"> <!-- 検索エンジン除外 -->
  <title>建機バーコードスキャナー (縦画面・突き抜け防止版)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <style>
    /* 全体サイズをスマホ画面に固定（スクロールを禁止） */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #f0f2f5;
      font-family: sans-serif;
    }
    
    /* 縦にパーツを並べるコンテナ */
    .app-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      box-sizing: border-box;
      padding: 10px;
    }

    /* タイトル（高さを最小限に） */
    h3 {
      margin: 5px 0;
      font-size: 16px;
      color: #333;
      flex: 0 0 auto;
    }

    /* 💡 カメラ映像エリア：幅だけでなく、高さ（縦幅）も厳格に制限する */
    #reader { 
      width: 100%; 
      max-width: 320px; 
      height: 200px; /* 縦幅の限界値を固定 */
      margin: 0 auto;
      border: 2px solid #ccc; 
      border-radius: 8px; 
      background-color: #000; 
      overflow: hidden;
      flex: 0 0 auto; /* 画面サイズに影響されて伸縮しないように固定 */
    }

    /* 💡 html5-qrcode内のビデオ要素そのものに高さを強制フィットさせる */
    #reader video {
      width: 100% !important;
      height: 100% !important;
      object-fit: cover !important; /* 縦横比を維持しながら、枠内に綺麗に収めてはみ出た分を切り取る */
    }
    
    /* ズームコントロールエリア */
    #zoom-control {
      margin: 8px auto;
      display: flex;
      justify-content: center;
      gap: 10px;
      width: 100%;
      max-width: 320px;
      flex: 0 0 auto;
    }
    
    .btn-zoom {
      background-color: #6c757d;
      color: white;
      border: none;
      padding: 8px 15px;
      font-size: 13px;
      font-weight: bold;
      border-radius: 4px;
      cursor: pointer;
      flex: 1;
    }
    
    .btn-zoom.active {
      background-color: #007bff;
    }
    
    /* ステータス表示 */
    #status { 
      margin: 5px 0;
      font-weight: bold; 
      color: #007bff; 
      font-size: 14px; 
      flex: 0 0 auto;
    }
    
    /* 結果ボックス */
    #result-box {
      margin: 5px auto;
      padding: 10px;
      background: #fff;
      border: 2px dashed #28a745;
      border-radius: 4px;
      width: 100%;
      max-width: 300px;
      box-sizing: border-box;
      flex: 0 1 auto; /* 残りの余白スペースにコンパクトに収まる */
    }
    
    #result { 
      font-size: 20px; 
      font-weight: bold;
      color: #28a745;
      word-break: break-all;
      margin-top: 3px;
    }
    
    .hint {
      font-size: 10px;
      color: #777;
      margin-top: 3px;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
</head>
<body>

  <div class="app-container">
    <h3>建機管理バーコードスキャナー</h3>
    
    <!-- 1. カメラ映像エリア（高さ上限200pxにガチッとロック） -->
    <div id="reader"></div>

    <!-- 2. ズームコントロール -->
    <div id="zoom-control">
      <button id="btn-zoom-1x" class="btn-zoom active">通常 (1x)</button>
      <button id="btn-zoom-2x" class="btn-zoom">2倍ズーム (2x)</button>
    </div>
    
    <!-- 3. ステータス -->
    <div id="status">起動中...</div>
    
    <!-- 4. 結果表示 -->
    <div id="result-box">
      <div style="font-size: 11px; color: #555;">最新の読み取り結果</div>
      <div id="result">【待機中】</div>
      <div class="hint">スキャン成功でGoogleフォームへ自動送信されます</div>
    </div>
  </div>

  <script>
    const statusDiv = document.getElementById('status');
    const resultDiv = document.getElementById('result');
    const btnZoom1x = document.getElementById('btn-zoom-1x');
    const btnZoom2x = document.getElementById('btn-zoom-2x');
    
    let html5QrcodeScanner = null;
    let cameraCapabilities = null;
    let isScanning = true;

    function playBeep() {
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();

        oscillator.type = 'sine'; 
        oscillator.frequency.setValueAtTime(1500, audioCtx.currentTime); 
        gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime); 

        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 0.08); 
      } catch (e) {
        console.log("オーディオ再生エラー:", e);
      }
    }

    function onScanSuccess(decodedText, decodedResult) {
      if (!isScanning) return; 
      isScanning = false;

      playBeep();

      resultDiv.innerText = decodedText;
      statusDiv.innerText = "成功！送信中...";

      const formUrl = "https://docs.google.com/forms/d/e/1FAIpQLSf-DTlcr2g8FPyjZo_09zFqzVYqSp5nw_VnO6vzXMNkcH9GBg/formResponse";
      const entryId = "entry.2075487833";

      const formData = new FormData();
      formData.append(entryId, decodedText);

      fetch(formUrl, {
        method: "POST",
        mode: "no-cors",
        body: formData
      })
      .then(() => {
        statusDiv.innerText = "送信完了！";
        setTimeout(() => {
          statusDiv.innerText = "次のバーコードをどうぞ。";
          isScanning = true;
        }, 2000);
      })
      .catch((err) => {
        statusDiv.innerText = "送信エラー: " + err;
        isScanning = true;
      });
    }

    async function applyZoom(zoomValue) {
      if (!html5QrcodeScanner || !cameraCapabilities) return;
      if (cameraCapabilities.zoom) {
        try {
          await html5QrcodeScanner.applyVideoConstrains({
            advanced: [{ zoom: zoomValue }]
          });
        } catch (err) {
          console.error("ズーム適用エラー:", err);
        }
      } else {
        statusDiv.innerText = "この端末はズーム非対応です。";
      }
    }

    btnZoom1x.addEventListener('click', () => {
      btnZoom1x.classList.add('active');
      btnZoom2x.classList.remove('active');
      applyZoom(1);
    });

    btnZoom2x.addEventListener('click', () => {
      if (cameraCapabilities && cameraCapabilities.zoom) {
        btnZoom2x.classList.add('active');
        btnZoom1x.classList.remove('active');
        const maxZoom = cameraCapabilities.zoom.max || 2;
        const targetZoom = Math.min(2, maxZoom);
        applyZoom(targetZoom);
      } else {
        alert("このスマートフォンのカメラはズーム制御に未対応です。");
      }
    });

    window.addEventListener('DOMContentLoaded', () => {
      html5QrcodeScanner = new Html5Qrcode("reader");
      
      const config = { 
        fps: 15, 
        qrbox: { width: 220, height: 110 }, 
        aspectRatio: 1.0,
        videoConstraints: {
          width: { ideal: 1920 },
          height: { ideal: 1080 },
          facingMode: "environment"
        }
      };

      html5QrcodeScanner.start(
        { facingMode: "environment" }, 
        config, 
        onScanSuccess
      )
      .then(() => {
        statusDiv.innerText = "バーコードを枠に合わせてください。";
        setTimeout(() => {
          try {
            cameraCapabilities = html5QrcodeScanner.getRunningTrackCapabilities();
          } catch (e) {
            console.error("カメラ性能取得失敗:", e);
          }
        }, 1000);
      })
      .catch(err => {
        statusDiv.innerText = "カメラ起動エラー: " + err;
      });
    });
  </script>
</body>
</html>
