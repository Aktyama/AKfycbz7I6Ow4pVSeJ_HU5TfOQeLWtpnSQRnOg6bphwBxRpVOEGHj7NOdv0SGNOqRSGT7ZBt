<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow"> <title>爆速バーコードスキャナー (音付き)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { 
      font-family: sans-serif; 
      margin: 20px; 
      text-align: center; 
      background-color: #f0f2f5; 
      color: #333; 
    }
    /* スキャン画面の枠組み */
    #reader { 
      width: 100%; 
      max-width: 400px; 
      margin: 0 auto;
      border: 2px solid #ccc; 
      border-radius: 8px; 
      background-color: #000; 
      overflow: hidden;
    }
    #status { 
      margin-top: 15px; 
      font-weight: bold; 
      color: #007bff; 
      font-size: 16px; 
    }
    #result-box {
      margin-top: 15px;
      padding: 15px;
      background: #fff;
      border: 2px dashed #28a745;
      border-radius: 4px;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
    }
    #result { 
      font-size: 24px; 
      font-weight: bold;
      color: #28a745;
      word-break: break-all;
    }
    .hint {
      font-size: 12px;
      color: #777;
      margin-top: 5px;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
</head>
<body>

  <h3>建機管理バーコードスキャナー</h3>
  
  <div id="reader"></div>
  
  <div id="status">起動中...</div>
  
  <div id="result-box">
    <div style="font-size: 12px; color: #555;">最新の読み取り結果</div>
    <div id="result">【ここに結果が出ます】</div>
    <div class="hint">読み取りに成功すると自動でGoogleフォームへ送信されます</div>
  </div>

  <script>
    const statusDiv = document.getElementById('status');
    const resultDiv = document.getElementById('result');
    let isScanning = true; // 連続送信を防ぐフラグ

    // 💡 ブラウザのスピーカーで「ピッ」という電子音を作る関数
    function playBeep() {
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();

        oscillator.type = 'sine'; // 音色（サイン波）
        oscillator.frequency.setValueAtTime(1500, audioCtx.currentTime); // 音の高さ（1500Hzの高音）
        gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime); // 音量

        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        oscillator.start();
        // 0.08秒（80ミリ秒）だけ鳴らして止める（レジの「ピッ」を再現）
        oscillator.stop(audioCtx.currentTime + 0.08); 
      } catch (e) {
        console.log("オーディオ再生エラー:", e);
      }
    }

    // 💡 読み取りに成功した時の処理
    function onScanSuccess(decodedText, decodedResult) {
      // 連続で何回も読み込んで送信してしまうのを防ぐ
      if (!isScanning) return; 
      isScanning = false;

      // 1. 「ピッ」と音を鳴らす
      playBeep();

      // 2. 画面の表示を読み取り結果に変える
      resultDiv.innerText = decodedText;
      statusDiv.innerText = "読み取り成功！送信中...";

      // 設定いただいたGoogleフォームのURLとentryのID
      const formUrl = "https://docs.google.com/forms/d/e/1FAIpQLSf-DTlcr2g8FPyjZo_09zFqzVYqSp5nw_VnO6vzXMNkcH9GBg/formResponse";
      const entryId = "entry.2075487833";

      const formData = new FormData();
      formData.append(entryId, decodedText);

      // 3. Googleフォームへ送信
      fetch(formUrl, {
        method: "POST",
        mode: "no-cors",
        body: formData
      })
      .then(() => {
        statusDiv.innerText = "スプレッドシートへの記録が完了しました。";
        // 2秒後に自動で次の読み取り状態に戻す
        setTimeout(() => {
          statusDiv.innerText = "次のバーコードをかざしてください。";
          isScanning = true;
        }, 2000);
      })
      .catch((err) => {
        statusDiv.innerText = "書き込み失敗: " + err;
        isScanning = true;
      });
    }

    // 💡 ページを開いた瞬間に自動でカメラを起動してスキャン開始
    window.addEventListener('DOMContentLoaded', () => {
      // スキャナーの設定（読み取り枠を正方形に近づけ、スマホ背面カメラを優先）
      const html5QrcodeScanner = new Html5Qrcode("reader");
      
      const config = { 
        fps: 15, // 1秒間に何回スキャンを試みるか（15〜20が最適）
        qrbox: { width: 280, height: 150 }, // バーコードが入りやすい横長の読み取り枠
        aspectRatio: 1.0
      };

      // 背面カメラ（environment）で即時開始
      html5QrcodeScanner.start(
        { facingMode: "environment" }, 
        config, 
        onScanSuccess
      )
      .then(() => {
        statusDiv.innerText = "スキャナー作動中。バーコードを枠に合わせてください。";
      })
      .catch(err => {
        statusDiv.innerText = "カメラ起動エラー。アクセスを許可してください: " + err;
      });
    });
  </script>
</body>
</html>
